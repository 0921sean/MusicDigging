<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Digging</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #909090;
      --accent: #e8ff5a;
      --like: #4ade80;
      --pass: #f87171;
      --escape: #a78bfa;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      padding: 28px 20px 32px;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ── SETUP ── */
    .setup-logo { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .setup-sub { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .api-row { margin-bottom: 6px; }
    .api-row input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 13px;
      font-family: 'SF Mono', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-row input:focus { border-color: var(--accent); }
    .api-row select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .api-row select:focus { border-color: var(--accent); }
    .api-row select option { background: var(--surface); }
    .api-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      display: inline-block;
      margin-top: 6px;
    }

    .seed-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      margin-top: 20px;
    }
    .seed-inputs input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .seed-inputs input:focus { border-color: var(--accent); }
    .seed-inputs input::placeholder { color: var(--muted); }
    .add-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      width: 46px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .add-btn:hover { background: var(--border); }

    .seed-list { margin-bottom: 28px; }
    .seed-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 6px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .seed-item .remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding-left: 10px;
    }

    .start-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 28px;
      transition: opacity 0.2s;
    }
    .start-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
    .start-btn:not(:disabled):hover { opacity: 0.88; }

    /* ── DISCOVER ── */
    .discover-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .discover-nav .title { font-size: 20px; font-weight: 800; }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
    }

    .card-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .card {
      position: absolute;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      will-change: transform;
    }
    .card:active { cursor: grabbing; }
    .card.is-back {
      transform: scale(0.95) translateY(14px);
      z-index: 0;
      pointer-events: none;
    }
    .card.is-front { z-index: 1; }

    .card-art {
      width: 100%;
      height: clamp(300px, 46vh, 400px);
      background: var(--surface2) center/cover no-repeat;
      position: relative;
    }
    .card-art.loading {
      animation: shimmer 1.4s ease-in-out infinite;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .card-art-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      opacity: 0.12;
    }
    .card-info-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 60px 18px 16px;
      background: linear-gradient(to top, rgba(8,8,8,0.98) 0%, rgba(8,8,8,0.6) 50%, transparent 100%);
    }
    .card-info-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }
    .card-text { flex: 1; min-width: 0; }

    .escape-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--escape);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .card-track { font-size: 22px; font-weight: 800; margin-bottom: 2px; line-height: 1.2; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-artist { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 0; }
    .card-tags { display: flex; flex-wrap: nowrap; gap: 5px; margin-bottom: 10px; overflow: hidden; }
    .tag {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 3px 9px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      flex-shrink: 0;
    }

    .swipe-label {
      position: absolute;
      top: 20px;
      z-index: 2;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.05em;
      opacity: 0;
      pointer-events: none;
      border: 2.5px solid;
      border-radius: 6px;
      padding: 3px 8px;
    }
    .swipe-label.like { right: 18px; color: var(--like); border-color: var(--like); }
    .swipe-label.pass { left: 18px; color: var(--pass); border-color: var(--pass); }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      margin-bottom: 12px;
    }
    .circle-btn {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2px solid;
      background: none;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, background 0.2s;
    }
    .circle-btn:active { transform: scale(0.85); }
    .circle-btn.pass { border-color: var(--pass); color: var(--pass); }
    .circle-btn.pass:hover { background: rgba(248,113,113,0.12); }
    .circle-btn.like { border-color: var(--like); color: var(--like); }
    .circle-btn.like:hover { background: rgba(74,222,128,0.12); }

    .escape-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--escape);
      border-radius: 26px;
      color: var(--escape);
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .escape-btn:hover { background: rgba(167,139,250,0.1); }
    .escape-btn.active { background: rgba(167,139,250,0.15); }
    .escape-pill {
      background: var(--escape);
      color: #000;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 0;
    }
    .empty .icon { font-size: 48px; margin-bottom: 14px; }
    .empty p { font-size: 14px; line-height: 1.7; }

    .loading-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 40px; }

    /* ── LIKES ── */
    .likes-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .likes-header h2 { font-size: 20px; font-weight: 800; }

    .likes-list { flex: 1; overflow-y: auto; }
    .like-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      gap: 12px;
    }
    .like-row .info .t { font-size: 15px; font-weight: 600; }
    .like-row .info .a { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .yt-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    /* ── IMPORT MODAL ── */
    .nav-right { display: flex; gap: 6px; align-items: center; }
    .icon-btn { padding: 7px 11px; }

    .import-link-btn {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      color: var(--accent);
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      margin-bottom: 6px;
      transition: background 0.2s;
    }
    .import-link-btn:hover { background: rgba(232,255,90,0.08); }

    .setup-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 16px 0 4px;
    }
    .setup-divider::before, .setup-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 300;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-width: 440px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slide-up 0.25s ease;
    }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close-btn {
      background: var(--surface2);
      border: none;
      border-radius: 50%;
      color: var(--text);
      width: 30px; height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }

    .upload-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 44px 24px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--accent);
      background: rgba(232,255,90,0.04);
    }
    .upload-icon { font-size: 44px; margin-bottom: 14px; }
    .upload-text { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .upload-sub { font-size: 12px; color: var(--muted); line-height: 1.6; }

    .import-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 44px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .import-results-header { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .import-track-list {
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px 12px;
    }
    .import-track-row { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .import-track-row:last-child { border-bottom: none; }
    .import-track-row.dup { opacity: 0.35; }
    .import-track-name { font-size: 14px; font-weight: 600; }
    .import-artist-name { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .import-action-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .import-action-btn:hover { opacity: 0.88; }
    .import-error {
      text-align: center;
      padding: 24px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── PREVIEW ── */
    .preview-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      border: 1.5px solid rgba(255,255,255,0.28);
      color: #fff;
      font-size: 17px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      pointer-events: auto;
    }
    .preview-btn:hover { background: rgba(255,255,255,0.22); }
    .preview-btn.playing {
      background: rgba(232,255,90,0.18);
      border-color: var(--accent);
      color: var(--accent);
    }
    .preview-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .preview-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.12);
      display: none;
    }
    .preview-bar.active { display: block; }
    .preview-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.5s linear;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="screen-setup">
  <div class="setup-logo">🎵 Music Digging</div>
  <div class="setup-sub">좋아하는 노래를 알려줘. 비슷한 느낌의 새 노래를 찾아줄게.</div>

  <div class="field-label">주로 쓰는 뮤직앱</div>
  <div class="api-row">
    <select id="music-app-select">
      <option value="">선택 안 함</option>
      <option value="spotify">Spotify</option>
      <option value="apple">Apple Music</option>
      <option value="youtube">YouTube Music</option>
      <option value="melon">멜론</option>
      <option value="genie">지니</option>
      <option value="flo">FLO</option>
      <option value="bugs">벅스</option>
      <option value="other">기타</option>
    </select>
  </div>

  <button class="import-link-btn" id="setup-import-btn">📷 재생목록 스크린샷으로 가져오기</button>

  <div class="setup-divider">또는 직접 입력</div>

  <div class="seed-inputs">
    <input type="text" id="artist-input" placeholder="아티스트" />
    <input type="text" id="track-input" placeholder="노래 제목" />
    <button class="add-btn" id="add-seed-btn">+</button>
  </div>

  <div class="seed-list" id="seed-list"></div>

  <button class="start-btn" id="start-btn" disabled>디깅 시작 →</button>
</div>

<!-- DISCOVER -->
<div class="screen" id="screen-discover">
  <div class="discover-nav">
    <button class="nav-btn" id="setup-nav-btn">← 씨드</button>
    <span class="title">🎵 Digging</span>
    <div class="nav-right">
      <button class="nav-btn icon-btn" id="discover-import-btn" title="재생목록 추가">📷</button>
      <button class="nav-btn" id="likes-nav-btn">좋아요 ♥</button>
    </div>
  </div>

  <div class="card-area" id="card-area">
    <div class="loading-msg">불러오는 중...</div>
  </div>

  <div class="actions">
    <button class="circle-btn pass" id="pass-btn" title="패스">✕</button>
    <button class="circle-btn like" id="like-btn" title="좋아요">♥</button>
  </div>

  <button class="escape-btn" id="escape-btn">
    🎲 완전 다른 거
    <span class="escape-pill" id="escape-pill" style="display:none"></span>
  </button>
</div>

<!-- LIKES -->
<div class="screen" id="screen-likes">
  <div class="likes-header">
    <button class="back-btn" id="back-btn">← 돌아가기</button>
    <h2>좋아요 목록</h2>
  </div>
  <div class="likes-list" id="likes-list"></div>
</div>

<div class="toast" id="toast"></div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="import-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="import-modal-title">재생목록 가져오기</div>
      <button class="modal-close-btn" id="import-modal-close">×</button>
    </div>
    <div class="modal-body" id="import-modal-body"></div>
  </div>
</div>

<script src="config.local.js" onerror="void 0"></script>
<script src="app.js?v=6"></script>
</body>
</html>
