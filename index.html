<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Music Digging</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #777;
      --accent: #e8ff5a;
      --like: #4ade80;
      --pass: #f87171;
      --escape: #a78bfa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      padding: 28px 20px 32px;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ── SETUP ── */
    .setup-logo { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .setup-sub { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .api-row { margin-bottom: 6px; }
    .api-row input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 13px;
      font-family: 'SF Mono', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-row input:focus { border-color: var(--accent); }
    .api-row select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .api-row select:focus { border-color: var(--accent); }
    .api-row select option { background: var(--surface); }
    .api-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      display: inline-block;
      margin-top: 6px;
    }

    .seed-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      margin-top: 20px;
    }
    .seed-inputs input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .seed-inputs input:focus { border-color: var(--accent); }
    .seed-inputs input::placeholder { color: var(--muted); }
    .add-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      width: 46px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .add-btn:hover { background: var(--border); }

    .seed-list { margin-bottom: 28px; }
    .seed-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 6px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .seed-item .remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding-left: 10px;
    }

    .start-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: auto;
      transition: opacity 0.2s;
    }
    .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .start-btn:not(:disabled):hover { opacity: 0.88; }

    /* ── DISCOVER ── */
    .discover-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .discover-nav .title { font-size: 20px; font-weight: 800; }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
    }

    .card-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card {
      position: absolute;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 24px 24px;
      cursor: grab;
      user-select: none;
      will-change: transform;
    }
    .card:active { cursor: grabbing; }
    .card.is-back {
      transform: scale(0.95) translateY(14px);
      z-index: 0;
      pointer-events: none;
    }
    .card.is-front { z-index: 1; }

    .escape-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--escape);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .card-track { font-size: 24px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
    .card-artist { font-size: 16px; color: var(--muted); margin-bottom: 20px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: var(--surface2);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      color: var(--muted);
    }

    .swipe-label {
      position: absolute;
      top: 18px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.05em;
      opacity: 0;
      pointer-events: none;
      border: 2.5px solid;
      border-radius: 6px;
      padding: 3px 8px;
    }
    .swipe-label.like { right: 18px; color: var(--like); border-color: var(--like); }
    .swipe-label.pass { left: 18px; color: var(--pass); border-color: var(--pass); }

    .actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 14px;
    }
    .circle-btn {
      width: 62px; height: 62px;
      border-radius: 50%;
      border: 2px solid;
      background: none;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.2s;
    }
    .circle-btn:active { transform: scale(0.88); }
    .circle-btn.pass { border-color: var(--pass); color: var(--pass); }
    .circle-btn.pass:hover { background: rgba(248,113,113,0.1); }
    .circle-btn.like { border-color: var(--like); color: var(--like); }
    .circle-btn.like:hover { background: rgba(74,222,128,0.1); }

    .escape-btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--escape);
      border-radius: 26px;
      color: var(--escape);
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .escape-btn:hover { background: rgba(167,139,250,0.1); }
    .escape-btn.active { background: rgba(167,139,250,0.15); }
    .escape-pill {
      background: var(--escape);
      color: #000;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 0;
    }
    .empty .icon { font-size: 48px; margin-bottom: 14px; }
    .empty p { font-size: 14px; line-height: 1.7; }

    .loading-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 40px; }

    /* ── LIKES ── */
    .likes-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .likes-header h2 { font-size: 20px; font-weight: 800; }

    .likes-list { flex: 1; overflow-y: auto; }
    .like-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      gap: 12px;
    }
    .like-row .info .t { font-size: 15px; font-weight: 600; }
    .like-row .info .a { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .yt-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="screen-setup">
  <div class="setup-logo">🎵 Music Digging</div>
  <div class="setup-sub">좋아하는 노래를 알려줘. 비슷한 느낌의 새 노래를 찾아줄게.</div>

  <div class="field-label">주로 쓰는 뮤직앱</div>
  <div class="api-row">
    <select id="music-app-select">
      <option value="">선택 안 함</option>
      <option value="spotify">Spotify</option>
      <option value="apple">Apple Music</option>
      <option value="youtube">YouTube Music</option>
      <option value="melon">멜론</option>
      <option value="genie">지니</option>
      <option value="flo">FLO</option>
      <option value="bugs">벅스</option>
      <option value="other">기타</option>
    </select>
  </div>

  <div class="seed-inputs">
    <input type="text" id="artist-input" placeholder="아티스트" />
    <input type="text" id="track-input" placeholder="노래 제목" />
    <button class="add-btn" id="add-seed-btn">+</button>
  </div>

  <div class="seed-list" id="seed-list"></div>

  <button class="start-btn" id="start-btn" disabled>디깅 시작 →</button>
</div>

<!-- DISCOVER -->
<div class="screen" id="screen-discover">
  <div class="discover-nav">
    <button class="nav-btn" id="setup-nav-btn">← 씨드</button>
    <span class="title">🎵 Digging</span>
    <button class="nav-btn" id="likes-nav-btn">좋아요 ♥</button>
  </div>

  <div class="card-area" id="card-area">
    <div class="loading-msg">불러오는 중...</div>
  </div>

  <div class="actions">
    <button class="circle-btn pass" id="pass-btn" title="패스">✕</button>
    <button class="circle-btn like" id="like-btn" title="좋아요">♥</button>
  </div>

  <button class="escape-btn" id="escape-btn">
    🎲 완전 다른 거
    <span class="escape-pill" id="escape-pill" style="display:none"></span>
  </button>
</div>

<!-- LIKES -->
<div class="screen" id="screen-likes">
  <div class="likes-header">
    <button class="back-btn" id="back-btn">← 돌아가기</button>
    <h2>좋아요 목록</h2>
  </div>
  <div class="likes-list" id="likes-list"></div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js?v=3"></script>
</body>
</html>
